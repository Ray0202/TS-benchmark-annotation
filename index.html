<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TS Benchmark Annotation</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card entry-card">
        <h1>TS Benchmark Annotation</h1>
        <p class="muted">Fill in annotator info, then start labeling.</p>

        <form id="setup-form" class="form-grid">
          <label>
            Annotator Name
            <input id="annotator-name" name="annotatorName" type="text" required placeholder="e.g. Ray" />
          </label>

          <label>
            Dataset
            <select id="dataset-select" name="dataset" required>
              <option value="">Loading...</option>
            </select>
          </label>

          <label>
            Number of Items
            <input id="annotation-count" name="annotationCount" type="number" min="1" value="5" required />
          </label>

          <fieldset>
            <legend>Tier (multi-select)</legend>
            <label><input type="checkbox" name="tier" value="T3" checked /> T3</label>
            <label><input type="checkbox" name="tier" value="T4" checked /> T4</label>
          </fieldset>

          <button type="submit" class="btn btn-primary">Start Annotation</button>
        </form>
        <div class="entry-actions">
          <a class="btn btn-linklike" href="examples.html">View Examples</a>
        </div>

        <p id="entry-message" class="message"></p>
      </section>
    </main>

    <script src="js/main.js" defer></script>
  </body>
</html>
