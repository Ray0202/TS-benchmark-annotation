<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TS Benchmark Annotation Session</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" id="annotate-root">
        <div id="annotate-header" class="row between"></div>
        <div id="progress" class="progress"></div>

        <div class="workbench">
          <article id="context-panel" class="context-panel"></article>
          <aside id="answer-panel" class="answer-panel"></aside>
        </div>
      </section>
    </main>

    <script src="js/annotate.js" defer></script>
  </body>
</html>
